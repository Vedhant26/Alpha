<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #1f78c8;
      --accent-hover: #155d9e;
      --border: #e1e4e8;
      --bg-muted: #f6f8fa;
    }
    
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }
    
    .header {
      background: linear-gradient(135deg, #1f78c8, #4aa8e8);
      color: white;
      padding: 16px;
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .content {
      padding: 16px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #586069;
    }
    
    select, input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: var(--bg-muted);
      font-family: inherit;
    }
    
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 120, 200, 0.3);
    }
    
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    button {
      width: 100%;
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    button:hover {
      background: var(--accent-hover);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      color: #28a745;
      display: none;
    }
    
    .error {
      color: #cb2431;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    Alpha Web Clipper
  </div>
  
  <div class="content">
    <div id="setupView" class="hidden">
      <div class="form-group">
        <label>Alpha Server URL</label>
        <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
      </div>
      <button id="btnConnect">Connect to Alpha</button>
      <div id="setupStatus" class="status error" style="display:block; margin-top:8px;"></div>
    </div>
    
    <div id="mainView" class="hidden">
      <div class="form-group">
        <label>Board</label>
        <select id="boardSelect"></select>
      </div>
      
      <div class="form-group">
        <label>Column</label>
        <select id="columnSelect"></select>
      </div>
      
      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="taskTitle">
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDesc" rows="3"></textarea>
      </div>
      
      <div class="form-group">
        <label>Reference URL</label>
        <input type="text" id="taskUrl" readonly style="color: #586069; background: #eee;">
      </div>
      
      <button id="btnClip">Clip to Alpha</button>
      
      <div id="clipStatus" class="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
