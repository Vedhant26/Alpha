services:
  - type: web
    name: alpha-kanban
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: alpha-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
